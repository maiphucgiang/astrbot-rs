name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-binaries:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: astrbot-rs
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: astrbot-rs
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: astrbot-rs
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: astrbot-rs.exe
            archive: zip

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p astrbot-rs

      - name: Package binary (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          tar czvf ../../../astrbot-rs-${{ matrix.target }}.${{ matrix.archive }} ${{ matrix.binary }}
          cd -

      - name: Package binary (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../astrbot-rs-${{ matrix.target }}.${{ matrix.archive }} ${{ matrix.binary }}
          cd -

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: astrbot-rs-${{ matrix.target }}
          path: astrbot-rs-${{ matrix.target }}.*

  create-release:
    name: Create Release
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          git log $(git describe --tags --abbrev=0 HEAD^)..HEAD --pretty=format:"- %s" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          body: |
            ## What's Changed
            
            ${{ steps.changelog.outputs.changelog }}
            
            ## Binaries
            
            | Platform | Target |
            |----------|--------|
            | Linux x86_64 | `x86_64-unknown-linux-gnu` |
            | macOS Intel | `x86_64-apple-darwin` |
            | macOS Apple Silicon | `aarch64-apple-darwin` |
            | Windows x86_64 | `x86_64-pc-windows-msvc` |
            
            Download and extract the appropriate archive for your platform.
          files: artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
