# AstrBot-rs Docker Compose (simplified)
# Quick start: docker compose up -d
# Build: docker compose build

version: '3.8'
services:
  astrbot:
    build: .
    ports:
      - "6185:6185"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./plugins:/app/plugins
    environment:
      - RUST_LOG=info
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "astrbot", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped