<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AstrBot</title>
<style>
:root {
  --bg: #0d0d12;
  --bg2: #14141b;
  --bg3: #1e1e2e;
  --accent: #7c3aed;
  --accent2: #a78bfa;
  --text: #e2e2e8;
  --text2: #9ca3af;
  --user-bg: #7c3aed;
  --bot-bg: #1e1e2e;
  --border: #2a2a3a;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
.header{height:56px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0}
.header-left{display:flex;align-items:center;gap:12px}
.logo{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff}
.header-title{font-size:16px;font-weight:600;letter-spacing:0.3px}
.header-status{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2)}
.status-dot{width:8px;height:8px;border-radius:50%;background:#ef4444;transition:background 0.3s}
.status-dot.connected{background:#22c55e;box-shadow:0 0 6px #22c55e}
.chat-area{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.msg{max-width:75%;display:flex;gap:10px;animation:fadeIn 0.3s ease}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg.bot{align-self:flex-start}
.avatar{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600}
.msg.user .avatar{background:linear-gradient(135deg,#7c3aed,#a78bfa);color:#fff}
.msg.bot .avatar{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.bubble{padding:12px 16px;border-radius:18px;font-size:14.5px;line-height:1.65;word-break:break-word;white-space:pre-wrap}
.msg.user .bubble{background:linear-gradient(135deg,var(--user-bg),#6d28d9);color:#fff;border-bottom-right-radius:4px}
.msg.bot .bubble{background:var(--bot-bg);color:var(--text);border:1px solid var(--border);border-bottom-left-radius:4px}
.meta{font-size:11px;color:var(--text2);margin-top:4px;padding:0 4px}
.msg.user .meta{text-align:right}
.system-msg{align-self:center;color:var(--text2);font-size:12px;padding:4px 12px;background:var(--bg2);border-radius:12px;border:1px solid var(--border);margin:4px 0}
.input-area{flex-shrink:0;padding:16px 20px 20px;background:var(--bg2);border-top:1px solid var(--border)}
.input-wrap{display:flex;gap:10px;align-items:flex-end;background:var(--bg3);border:1px solid var(--border);border-radius:16px;padding:10px 14px;transition:border-color 0.2s}
.input-wrap:focus-within{border-color:var(--accent)}
#msgInput{flex:1;background:transparent;border:none;color:var(--text);font-size:15px;line-height:1.5;resize:none;outline:none;max-height:120px;font-family:inherit}
#msgInput::placeholder{color:var(--text2)}
#sendBtn{width:36px;height:36px;border-radius:50%;border:none;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all 0.2s}
#sendBtn:hover{background:var(--accent2);transform:scale(1.05)}
#sendBtn:disabled{background:var(--border);cursor:not-allowed;transform:none}
.send-icon{width:18px;height:18px}
.welcome{align-self:center;text-align:center;color:var(--text2);margin-top:auto;margin-bottom:auto;max-width:400px}
.welcome h2{font-size:20px;margin-bottom:8px;color:var(--text)}
.welcome p{font-size:14px;line-height:1.7}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#3a3a4a}
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <div class="logo">AB</div>
    <div class="header-title">AstrBot</div>
  </div>
  <div class="header-status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">连接中...</span>
  </div>
</div>
<div class="chat-area" id="chatArea">
  <div class="welcome" id="welcome">
    <h2>AstrBot</h2>
    <p>基于 Rust 重构的多平台聊天机器人<br>支持 Pipeline 9-stage 处理链路</p>
  </div>
</div>
<div class="input-area">
  <div class="input-wrap">
    <textarea id="msgInput" rows="1" placeholder="输入消息..." oninput="this.rows=Math.min(5,this.value.split('\n').length)"></textarea>
    <button id="sendBtn" disabled>
      <svg class="send-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
    </button>
  </div>
</div>

<script>
const chatArea = document.getElementById('chatArea');
const msgInput = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const welcome = document.getElementById('welcome');
let sessionId = localStorage.getItem('ab_session') || '';
let ws = null;

function appendMsg(role, text) {
  if (welcome) welcome.style.display = 'none';
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = role === 'user' ? '你' : 'AB';
  const bubbleWrap = document.createElement('div');
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  const meta = document.createElement('div');
  meta.className = 'meta';
  meta.textContent = new Date().toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'});
  bubbleWrap.appendChild(bubble);
  bubbleWrap.appendChild(meta);
  div.appendChild(avatar);
  div.appendChild(bubbleWrap);
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function sysMsg(text) {
  const div = document.createElement('div');
  div.className = 'system-msg';
  div.textContent = text;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function setStatus(connected, text) {
  statusDot.classList.toggle('connected', connected);
  statusText.textContent = text;
  sendBtn.disabled = !connected;
}

function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws/chat`);
  ws.onopen = () => setStatus(true, '已连接');
  ws.onmessage = (ev) => {
    try {
      const data = JSON.parse(ev.data);
      if (data.error && !data.reply) { sysMsg('错误: ' + data.error); return; }
      if (data.reply) appendMsg('bot', data.reply);
      if (data.session_id) { sessionId = data.session_id; localStorage.setItem('ab_session', sessionId); }
    } catch(e) { appendMsg('bot', ev.data); }
  };
  ws.onclose = () => { setStatus(false, '断开，重连中...'); setTimeout(connect, 3000); };
  ws.onerror = () => setStatus(false, '连接错误');
}

function send() {
  const text = msgInput.value.trim();
  if (!text || !ws || ws.readyState !== 1) return;
  appendMsg('user', text);
  ws.send(JSON.stringify({message: text, session_id: sessionId}));
  msgInput.value = '';
  msgInput.rows = 1;
}

sendBtn.onclick = send;
msgInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } });
connect();
</script>
</body>
</html>
