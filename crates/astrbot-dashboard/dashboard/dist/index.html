<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AstrBot WebChat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a2e;color:#eee;height:100vh;display:flex;flex-direction:column}
.header{padding:12px 16px;background:#16213e;border-bottom:1px solid #0f3460;display:flex;align-items:center;gap:8px}
.header h1{font-size:16px;font-weight:600}
.status{width:8px;height:8px;border-radius:50%;background:#e94560}
.status.connected{background:#0f0}
.chat{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.message{max-width:80%;padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.5;word-break:break-word}
.message.user{align-self:flex-end;background:#0f3460}
.message.assistant{align-self:flex-start;background:#16213e;border:1px solid #0f3460}
.message .meta{font-size:11px;color:#888;margin-top:4px}
.input-area{padding:12px 16px;background:#16213e;border-top:1px solid #0f3460;display:flex;gap:8px}
.input-area input{flex:1;padding:10px 14px;border:1px solid #0f3460;border-radius:8px;background:#1a1a2e;color:#eee;font-size:14px;outline:none}
.input-area input:focus{border-color:#e94560}
.input-area button{padding:10px 18px;border:none;border-radius:8px;background:#e94560;color:#fff;font-size:14px;cursor:pointer}
.input-area button:disabled{background:#555;cursor:not-allowed}
.input-area button:hover:not(:disabled){background:#ff6b6b}
.system{text-align:center;color:#888;font-size:12px;padding:4px}
</style>
</head>
<body>
<div class="header">
 <div class="status" id="status"></div>
 <h1>AstrBot WebChat</h1>
</div>
<div class="chat" id="chat"></div>
<div class="input-area">
 <input type="text" id="msgInput" placeholder="输入消息..." autocomplete="off">
 <button id="sendBtn">发送</button>
</div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');
const status = document.getElementById('status');
let sessionId = localStorage.getItem('webchat_session') || '';
let ws = null;

function appendMsg(role, text, meta='') {
 const div = document.createElement('div');
 div.className = `message ${role}`;
 div.innerHTML = text.replace(/\n/g,'<br>') + (meta ? `<div class="meta">${meta}</div>` : '');
 chat.appendChild(div);
 chat.scrollTop = chat.scrollHeight;
}

function systemMsg(text) {
 const div = document.createElement('div');
 div.className = 'system';
 div.textContent = text;
 chat.appendChild(div);
 chat.scrollTop = chat.scrollHeight;
}

function connect() {
 const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
 ws = new WebSocket(`${proto}//${location.host}/ws/chat`);
 
 ws.onopen = () => {
 status.classList.add('connected');
 systemMsg('已连接');
 sendBtn.disabled = false;
 };
 
 ws.onmessage = (ev) => {
 try {
 const data = JSON.parse(ev.data);
 if (data.error && !data.reply) {
 systemMsg(`错误: ${data.error}`);
 return;
 }
 if (data.reply) {
 appendMsg('assistant', data.reply, data.session_id ? `session: ${data.session_id.slice(0,8)}` : '');
 }
 if (data.session_id) {
 sessionId = data.session_id;
 localStorage.setItem('webchat_session', sessionId);
 }
 } catch(e) {
 appendMsg('assistant', ev.data);
 }
 };
 
 ws.onclose = () => {
 status.classList.remove('connected');
 systemMsg('连接断开，3秒后重连...');
 sendBtn.disabled = true;
 setTimeout(connect, 3000);
 };
 
 ws.onerror = (e) => {
 console.error('WS error', e);
 status.classList.remove('connected');
 };
}

function send() {
 const text = input.value.trim();
 if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
 appendMsg('user', text);
 ws.send(JSON.stringify({message: text, session_id: sessionId}));
 input.value = '';
 sendBtn.disabled = true;
 setTimeout(() => sendBtn.disabled = false, 500);
}

sendBtn.onclick = send;
input.onkeydown = (e) => { if (e.key === 'Enter') send(); };
connect();
</script>
</body>
</html>
